<!DOCTYPE html>
<html>
<head>
  <title>AI Engine Control</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg,#0f0f0f,#1c1c2e);
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 { color: cyan; }

    button {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .start { background: #00ff9d; }
    .stop { background: #ff4d4d; }
    .gpu { background: orange; }
    .colab { background: purple; }
    .add { background: #00c3ff; }

    .pillar {
      background: #222;
      padding: 10px;
      margin: 10px;
      border-radius: 12px;
      display: inline-block;
    }

    pre {
      background: black;
      padding: 10px;
      border-radius: 10px;
      text-align: left;
      max-width: 600px;
      margin: auto;
    }

    input, select {
      padding: 8px;
      border-radius: 6px;
      border: none;
    }
  </style>
</head>

<body>

<h1>🚀 AI Engine Control</h1>

<!-- ENGINE -->
<button class="start" onclick="start()">Start 🚀</button>
<button class="stop" onclick="stop()">Stop ⛔</button>

<br><br>

<!-- MODE -->
<button class="gpu" onclick="setMode('ovh')">GPU ⚡</button>
<button class="colab" onclick="setMode('colab')">Colab ☁️</button>

<br><br>

<!-- DELAY CONTROL -->
<h3>⚡ Speed Control</h3>
<input type="range" min="1" max="20" value="2" id="delaySlider" oninput="updateDelay()">
<p>Delay: <span id="delayValue">2</span> sec</p>

<br>

<!-- ADD PILLAR -->
<input id="pillarInput" placeholder="New pillar">
<button class="add" onclick="addPillar()">Add ➕</button>

<h3>🎯 Pillars</h3>
<div id="pillars"></div>

<br>

<button onclick="getStatus()">Status</button>
<button onclick="getQueue()">Queue</button>

<pre id="output"></pre>

<script>
const API = "https://a61fb53f-5ac1-4938-a34e-6baf85521efc-00-2jblmnx3qfkc7.sisko.replit.dev";

let pillars = JSON.parse(localStorage.getItem("pillars")) || [
  "dog","satisfying","survival","restoration","whatif","house"
];

render();

// ENGINE
async function start(){
  let r = await fetch(API+"/start",{method:"POST"});
  show(await r.json());
}

async function stop(){
  let r = await fetch(API+"/stop",{method:"POST"});
  show(await r.json());
}

// MODE
async function setMode(mode){
  let r = await fetch(API+"/mode/"+mode,{method:"POST"});
  show(await r.json());
}

// DELAY CONTROL
async function updateDelay(){
  let val = document.getElementById("delaySlider").value;
  document.getElementById("delayValue").innerText = val;

  await fetch(API+"/set-delay/"+val,{method:"POST"});
}

// ADD
function addPillar(){
  let name = document.getElementById("pillarInput").value;
  if(!name) return;

  pillars.push(name);
  save();
  render();
}

// EDIT + REMOVE UI
function render(){
  let container = document.getElementById("pillars");
  container.innerHTML = "";

  pillars.forEach((p,i)=>{
    let div = document.createElement("div");
    div.className="pillar";

    div.innerHTML = `
      <input value="${p}" onchange="edit(${i}, this.value)">
      <br>
      <button onclick="run('${p}')">Run ▶️</button>
      <button onclick="remove(${i})">❌</button>
    `;

    container.appendChild(div);
  });
}

function edit(i,val){
  pillars[i]=val;
  save();
}

function remove(i){
  pillars.splice(i,1);
  save();
  render();
}

function save(){
  localStorage.setItem("pillars", JSON.stringify(pillars));
}

// RUN
async function run(type){
  let r = await fetch(API+"/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({type})
  });
  show(await r.json());
}

// STATUS
async function getStatus(){
  let r = await fetch(API+"/status");
  show(await r.json());
}

// QUEUE
async function getQueue(){
  let r = await fetch(API+"/queue");
  show(await r.json());
}

// OUTPUT
function show(data){
  document.getElementById("output").innerText =
    JSON.stringify(data,null,2);
}
</script>

</body>
</html>

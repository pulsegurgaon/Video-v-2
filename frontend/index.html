<!DOCTYPE html>
<html>
<head>
  <title>AI Video Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .danger {
      background: #ef4444;
    }

    ul {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🚀 AI Video Control Panel</h1>

<!-- 🧠 LLM MODE -->
<div class="card">
  <h3>🧠 AI Brain</h3>

  <select id="llmMode">
    <option value="groq">⚡ Groq (Fast)</option>
    <option value="ollama">🖥️ Ollama (Local)</option>
  </select>

  <button onclick="saveLLM()">💾 Save Brain Mode</button>
</div>

<!-- 🌐 COLAB -->
<div class="card">
  <h3>🌐 Video Server (Colab)</h3>

  <input id="colabUrl" placeholder="Paste Colab /generate URL here" />

  <button onclick="saveColabUrl()">💾 Save URL</button>
  <button onclick="testColab()">🧪 Test Connection</button>

  <p id="colabStatus"></p>
</div>

<!-- 🎯 PILLARS -->
<div class="card">
  <h3>🎯 Pillars</h3>

  <input id="pillarInput" placeholder="Enter new pillar" />
  <button onclick="addPillar()">➕ Add Pillar</button>

  <ul id="pillarList"></ul>
</div>

<!-- 🚀 ENGINE -->
<div class="card">
  <h3>🚀 Engine Control</h3>

  <button onclick="startEngine()">▶ Start</button>
  <button class="danger" onclick="stopEngine()">⛔ Stop</button>

  <p id="engineStatus"></p>
</div>

<!-- 📊 STATUS -->
<div class="card">
  <h3>📊 Live Status</h3>
  <pre id="statusBox">Loading...</pre>
</div>

<!-- 📦 QUEUE -->
<div class="card">
  <h3>📦 Generated Videos</h3>
  <pre id="queueBox">Empty</pre>
</div>

<script>

const BASE_URL = "http://127.0.0.1:8000"; // change to Render later

// ----------------------
// LOAD ON START
// ----------------------
window.onload = () => {
  document.getElementById("colabUrl").value = localStorage.getItem("COLAB_API") || "";
  document.getElementById("llmMode").value = localStorage.getItem("LLM_MODE") || "groq";
  loadPillars();
  fetchStatus();
  fetchQueue();
};

// ----------------------
// SYNC CONFIG
// ----------------------
async function syncConfig() {
  const colab_url = localStorage.getItem("COLAB_API");
  const llm_mode = localStorage.getItem("LLM_MODE");
  const pillars = JSON.parse(localStorage.getItem("PILLARS") || "[]");

  await fetch(BASE_URL + "/config", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      colab_url,
      llm_mode,
      pillars
    })
  });
}

// ----------------------
// LLM
// ----------------------
async function saveLLM() {
  const mode = document.getElementById("llmMode").value;
  localStorage.setItem("LLM_MODE", mode);

  await syncConfig();
  alert("🧠 Brain set to: " + mode);
}

// ----------------------
// COLAB
// ----------------------
async function saveColabUrl() {
  const url = document.getElementById("colabUrl").value;
  localStorage.setItem("COLAB_API", url);

  await syncConfig();
  document.getElementById("colabStatus").innerText = "✅ Saved + Synced";
}

async function testColab() {
  const url = document.getElementById("colabUrl").value;

  try {
    const res = await fetch(url);
    await res.json();
    document.getElementById("colabStatus").innerText = "✅ Connected";
  } catch {
    document.getElementById("colabStatus").innerText = "❌ Failed";
  }
}

// ----------------------
// PILLARS
// ----------------------
function loadPillars() {
  const list = JSON.parse(localStorage.getItem("PILLARS") || "[]");
  const ul = document.getElementById("pillarList");
  ul.innerHTML = "";

  list.forEach((p, i) => {
    const li = document.createElement("li");
    li.innerHTML = `${p} <button onclick="removePillar(${i})">❌</button>`;
    ul.appendChild(li);
  });
}

async function addPillar() {
  const input = document.getElementById("pillarInput");
  let list = JSON.parse(localStorage.getItem("PILLARS") || "[]");

  list.push(input.value);
  localStorage.setItem("PILLARS", JSON.stringify(list));

  input.value = "";
  loadPillars();

  await syncConfig();
}

async function removePillar(i) {
  let list = JSON.parse(localStorage.getItem("PILLARS") || "[]");
  list.splice(i, 1);

  localStorage.setItem("PILLARS", JSON.stringify(list));
  loadPillars();

  await syncConfig();
}

// ----------------------
// ENGINE
// ----------------------
async function startEngine() {
  await fetch(BASE_URL + "/start", {method: "POST"});
  document.getElementById("engineStatus").innerText = "🚀 Running";
}

async function stopEngine() {
  await fetch(BASE_URL + "/stop", {method: "POST"});
  document.getElementById("engineStatus").innerText = "🛑 Stopped";
}

// ----------------------
// STATUS
// ----------------------
async function fetchStatus() {
  try {
    const res = await fetch(BASE_URL + "/status");
    const data = await res.json();

    document.getElementById("statusBox").innerText =
      JSON.stringify(data, null, 2);
  } catch {
    document.getElementById("statusBox").innerText = "❌ Backend not connected";
  }
}

// ----------------------
// QUEUE
// ----------------------
async function fetchQueue() {
  try {
    const res = await fetch(BASE_URL + "/queue");
    const data = await res.json();

    document.getElementById("queueBox").innerText =
      JSON.stringify(data, null, 2);
  } catch {
    document.getElementById("queueBox").innerText = "❌ No data";
  }
}

// 🔁 Auto refresh every 5 sec
setInterval(() => {
  fetchStatus();
  fetchQueue();
}, 5000);

</script>

</body>
</html>

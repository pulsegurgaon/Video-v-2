<!DOCTYPE html>
<html>
<head>
  <title>AI Video Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .danger {
      background: #ef4444;
    }
  </style>
</head>

<body>

<h1>🚀 AI Video Control Panel</h1>

<!-- 🧠 LLM MODE -->
<div class="card">
  <h3>🧠 AI Brain</h3>

  <select id="llmMode">
    <option value="groq">⚡ Groq (Fast)</option>
    <option value="ollama">🖥️ Ollama (Local)</option>
  </select>

  <button onclick="saveLLM()">💾 Save Brain Mode</button>
</div>

<!-- 🎬 COLAB URL -->
<div class="card">
  <h3>🌐 Video Server (Colab)</h3>

  <input id="colabUrl" placeholder="Paste Colab /generate URL here" />

  <button onclick="saveColabUrl()">💾 Save URL</button>
  <button onclick="testColab()">🧪 Test Connection</button>

  <p id="colabStatus"></p>
</div>

<!-- 🎯 PILLARS -->
<div class="card">
  <h3>🎯 Pillars</h3>

  <input id="pillarInput" placeholder="Enter new pillar" />
  <button onclick="addPillar()">➕ Add Pillar</button>

  <ul id="pillarList"></ul>
</div>

<!-- 🚀 ENGINE -->
<div class="card">
  <h3>🚀 Engine Control</h3>

  <button onclick="startEngine()">▶ Start</button>
  <button class="danger" onclick="stopEngine()">⛔ Stop</button>
</div>

<script>

// ----------------------
// LOAD SAVED DATA
// ----------------------
window.onload = () => {
  document.getElementById("colabUrl").value = localStorage.getItem("COLAB_API") || "";
  loadPillars();
};

// ----------------------
// SAVE LLM MODE
// ----------------------
function saveLLM() {
  const mode = document.getElementById("llmMode").value;
  localStorage.setItem("LLM_MODE", mode);
  alert("Saved: " + mode);
}

// ----------------------
// COLAB URL
// ----------------------
function saveColabUrl() {
  const url = document.getElementById("colabUrl").value;
  localStorage.setItem("COLAB_API", url);
  document.getElementById("colabStatus").innerText = "✅ Saved!";
}

async function testColab() {
  const url = localStorage.getItem("COLAB_API");

  if (!url) {
    alert("Enter URL first");
    return;
  }

  try {
    const res = await fetch(url);
    const data = await res.json();
    document.getElementById("colabStatus").innerText = "✅ Connected";
  } catch {
    document.getElementById("colabStatus").innerText = "❌ Failed";
  }
}

// ----------------------
// PILLARS
// ----------------------
function loadPillars() {
  const list = JSON.parse(localStorage.getItem("PILLARS") || "[]");
  const ul = document.getElementById("pillarList");
  ul.innerHTML = "";

  list.forEach((p, i) => {
    const li = document.createElement("li");
    li.innerHTML = `${p} <button onclick="removePillar(${i})">❌</button>`;
    ul.appendChild(li);
  });
}

function addPillar() {
  const input = document.getElementById("pillarInput");
  let list = JSON.parse(localStorage.getItem("PILLARS") || "[]");

  list.push(input.value);
  localStorage.setItem("PILLARS", JSON.stringify(list));

  input.value = "";
  loadPillars();
}

function removePillar(i) {
  let list = JSON.parse(localStorage.getItem("PILLARS") || "[]");
  list.splice(i, 1);
  localStorage.setItem("PILLARS", JSON.stringify(list));
  loadPillars();
}

// ----------------------
// ENGINE (placeholder for now)
// ----------------------
function startEngine() {
  alert("Engine start will connect after backend is ready 🚀");
}

function stopEngine() {
  alert("Engine stopped 🛑");
}

</script>

</body>
</html>
